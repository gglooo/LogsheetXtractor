name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore LogsheetXtractor.Solution/LogsheetXtractor.Solution.sln

      - name: Build
        run: dotnet build LogsheetXtractor.Solution/LogsheetXtractor.Solution.sln --no-restore

      - name: Test (All Backend Test Projects)
        run: dotnet test LogsheetXtractor.Solution/LogsheetXtractor.Solution.sln --no-build --verbosity normal --blame-crash

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (Vitest)
        run: pnpm test

      - name: Install Playwright Browsers
        run: pnpm test:e2e:install

      - name: Test (Playwright)
        run: pnpm test:e2e
