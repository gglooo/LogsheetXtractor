name: Docs Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend dependencies
        run: dotnet restore "LogsheetXtractor.Solution/LogsheetXtractor.API/LogsheetXtractor.API.csproj"

      - name: Build backend API
        run: dotnet build "LogsheetXtractor.Solution/LogsheetXtractor.API/LogsheetXtractor.API.csproj" --no-restore

      - name: Generate fresh OpenAPI from running API
        run: |
          set -euo pipefail
          export ASPNETCORE_ENVIRONMENT=Development
          export ASPNETCORE_URLS=http://127.0.0.1:5180
          dotnet run --project "LogsheetXtractor.Solution/LogsheetXtractor.API/LogsheetXtractor.API.csproj" --no-build --urls http://127.0.0.1:5180 > /tmp/logsheetxtractor-api.log 2>&1 &
          API_PID=$!

          cleanup() {
            kill $API_PID || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:5180/swagger/v1/swagger.json" -o "docs/openapi/logsheetxtractor.swagger.json"; then
              exit 0
            fi
            sleep 1
          done

          echo "Failed to fetch generated OpenAPI spec."
          echo "API startup log:"
          cat /tmp/logsheetxtractor-api.log
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
