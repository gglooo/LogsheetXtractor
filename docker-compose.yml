services:
  backend:
    build:
      context: .
      dockerfile: WebFormHTR.Solution/WebFormHTR.API/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./formHTR:/app/formHTR
      - ./WebFormHTR.Solution/WebFormHTR.API/app.db:/app/app.db


