services:
  backend:
    build:
      context: .
      dockerfile: WebFormHTR.Solution/WebFormHTR.API/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    volumes:
      - ./formHTR:/app/formHTR
      - ./app_data:/app/app_data
      - ./credentials:/app/credentials

  frontend:
    build:
      context: ./web
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
